<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width, initial-scale=1">

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">

<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js">
</script>

<style>

body{
background:black;
color:white;
margin:0;
}

#playerBox{
position:relative;
max-width:100%;
}

video{
width:100%;
background:black;
}


/* overlay */

#topBar{

position:absolute;
top:0;
left:0;
right:0;

padding:8px;

background:linear-gradient(black,transparent);

color:white;

}


#bottomBar{

position:absolute;
bottom:0;
left:0;
right:0;

padding:8px;

display:flex;
justify-content:flex-end;

background:linear-gradient(transparent,black);

}

</style>

</head>

<body>



<div id="playerBox">

<video
id="video"
controls
playsinline
webkit-playsinline>

<source src="video/video.mp4">

<track src="subs/sub0.vtt" kind="subtitles">
<track src="subs/sub1.vtt" kind="subtitles">

</video>


<div id="topBar">

My Player

</div>


<div id="bottomBar">

<button
class="btn btn-dark btn-sm"
data-bs-toggle="modal"
data-bs-target="#settingsModal">

⚙

</button>

</div>

</div>



<!-- modal -->

<div class="modal fade"
id="settingsModal">

<div class="modal-dialog">

<div class="modal-content
bg-dark text-white">

<div class="modal-header">

Settings

<button
class="btn-close btn-close-white"
data-bs-dismiss="modal">

</button>

</div>


<div class="modal-body">


Audio

<select
id="audioSelect"
class="form-select mb-3">

<option value="audio/eng.mp3">
English
</option>

<option value="audio/jpn.mp3">
Japanese
</option>

</select>



Subtitle

<select
id="subSelect"
class="form-select">

<option value="-1">
Off
</option>

<option value="0">
Sub1
</option>

<option value="1">
Sub2
</option>

</select>


</div>

</div>

</div>

</div>



<script>


let video =
document.getElementById("video")

let audio =
new Audio()

let audioSelect =
document.getElementById("audioSelect")

let subSelect =
document.getElementById("subSelect")

let started = false


// mobile fix → start after tap

video.addEventListener(
"play",
()=>{

if(!started){

audio.src =
audioSelect.value

audio.currentTime =
video.currentTime

started = true

}

audio.play()

}
)



video.addEventListener(
"pause",
()=>audio.pause()
)



video.addEventListener(
"seeking",
()=>{

audio.currentTime =
video.currentTime

}
)



video.addEventListener(
"timeupdate",
()=>{

if(
Math.abs(
video.currentTime -
audio.currentTime
)>0.3
)
audio.currentTime =
video.currentTime

}
)



video.addEventListener(
"ratechange",
()=>{

audio.playbackRate =
video.playbackRate

}
)



// change audio

audioSelect.onchange =
function(){

let t =
video.currentTime

audio.src =
this.value

audio.currentTime = t

if(!video.paused)
audio.play()

}



// subtitle

subSelect.onchange =
function(){

let tracks =
video.textTracks

for(
let i=0;
i<tracks.length;
i++
)
tracks[i].mode =
"disabled"

if(this.value!=-1)
tracks[this.value].mode =
"showing"

}


</script>

</body>
</html>
